name: ShellCheck

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck \
            install.sh \
            bin/termux-codex-keeper \
            examples/termux-boot/termux-codex-keeper-boot.sh \
            tests/smoke.sh

      - name: Run smoke check
        run: bash tests/smoke.sh
